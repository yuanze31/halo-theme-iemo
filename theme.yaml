apiVersion: theme.halo.run/v1alpha1
kind: Theme
metadata:
  name: theme-iemo-yuanze
spec:
  displayName: iEmo-yuanze
  author:
    name: yuanze
    website: "https://github.com/yuanze31"
  customTemplates:
    page:
      - name: 友情链接页面模版
        description: 支持可预设文本的友链
        screenshot:
        file: page_links.html
  description: 简约感设计Halo主题
  logo: "/themes/theme-iemo/assets/images/logo.png"
  homepage: "https://www.halo.run/store/apps/app-ufBcY"
  repo: "https://github.com/yuanze31/halo-theme-iemo"
  issues: "https://github.com/yuanze31/halo-theme-iemo/issues"
  settingName: "theme-iemo-setting"
  configMapName: "theme-iemo-configMap"
  version: "1.1.1"
  requires: ">=2.22.1"
  license:
    - name: "MIT License"
      url: "https://github.com/yuanze31/halo-theme-iemo/blob/main/LICENSE"
